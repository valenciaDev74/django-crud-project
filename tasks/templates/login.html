{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-box-arrow-in-right" style="font-size: 3rem; color: #0d6efd;"></i>
                    <h2 class="fw-bold mt-2">Welcome back</h2>
                    <p class="text-muted">Sign in to your account</p>
                </div>

                {% if error %}
                <div class="alert alert-danger d-flex align-items-center" role="alert">
                    <i class="bi bi-exclamation-triangle me-2"></i>
                    <div>{{ error }}</div>
                </div>
                {% endif %}

                <form action="/login/" method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label for="{{ field.id_for_label }}" class="form-label fw-medium">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                        <div class="text-danger small mt-1">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary w-100 py-2">
                        <i class="bi bi-box-arrow-in-right"></i> Log in
                    </button>
                </form>

                <p class="text-center text-muted mt-3 mb-0">
                    Don't have an account?
                    <a href="/signup" class="text-decoration-none">Sign up</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
